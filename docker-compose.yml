services:
  postgres:
    image: postgres:16-alpine
    container_name: ccm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudcost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloudcost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ccm-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      JWT_SECRET: ${LOCAL_JWT_SECRET:-dev_jwt_secret_change_me}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
      DB_NAME: cloudcost
      DB_SSL: "false"
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: ccm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
